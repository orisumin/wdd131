<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="garyeong bae">
    <meta name="description" content="flexbox">
        <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Your Title">
    <meta property="og:description" content="Your Description">
    <meta property="og:url" content="Your URL">
    <meta property="og:image" content="social-preview-image.png">

    <!-- X Card -->
    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="Your Title">
    <meta name="twitter:description" content="Your Description">
    <meta name="twitter:image" content="social-preview-image.png">
    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico">
    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="imgs/apple-touch-icon.png">
    <script src="flexbox.js" defer></script>
    <link href="flexbox.css" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <header>
        <img src="imgs/recipe-book.png" alt="recipe book icon">
        <h1>RECIPEBOOK</h1>
    </header>
    <main>
        <form>
            <input type="text" class="search" placeholder="Find a recipe">
            <button id="srch" type="button"><img src="imgs/search.svg" alt="magnifying glass"></button>
        </form>
        <hr>
        <wrapper id="field">
            <section class="recipe-card">
                <img src="imgs/apple-crisp.jpg" alt="apple crisp image">
                <div class="description">
                    <p class="tag">dessert</p>
                    <h2>APPLE CRISP</h2>
                    <span class="rating" role="img" aria-label="Rating: 4 out of 5 stars">
                        <span aria-hidden="true" class="icon-star">⭐</span>
                        <span aria-hidden="true" class="icon-star">⭐</span>
                        <span aria-hidden="true" class="icon-star">⭐</span>
                        <span aria-hidden="true" class="icon-star">⭐</span>
                        <span aria-hidden="true" class="icon-star-empty">☆</span>
                    </span>
                    <p class="explanation">This apple crisp recipe is a simple yet delicious fall dessert that's great served warm with vanilla ice cream.</p>
                </div>
            </section>
        </wrapper>
        
        <div class="bottom">
            <div class="social">
            <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
            <a href="#"><img src="imgs/instagram_icon.svg" alt="instagram icon"></a>
            <a href="#"><img src="imgs/youtube_icon.svg" alt="youtube icon"></a>
            <a href="#"><img src="imgs/pinterest_icon.svg" alt="pinterest icon"></a>
            </div>
            <a href="https://www.flaticon.com/free-icons/recipe" title="recipe cons" class="link">Recipe icons created by Freepik - Flaticon</a>
        </div>
                   
                
    </main>
    <footer>
    <p>&copy; Garyeong Bae</p>
    </footer>
</body>

</html>
