<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="garyeong bae">
    <meta name="description" content="event_ticket">
    <script src="ticket.js" defer></script>
    <link href="ticket.css" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <section id="page">
        <h1>Event Ticket</h1>
        <form id="form">
            <div class="half1">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" name="firstName" required>
            </div>

            <div class="half2">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" name="lastName" required>
            </div>

            <div class="full">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="half1">
                <label for="ticketType">Type</label>
                    <select name="ticketType" id="ticketType">
                        <option value="">Choose one</option>
                        <option value="student">Student</option>
                        <option value="guest">Guest</option>
                    </select>
            </div>

            <div class="half2">
                <label for="date">Event Date</label>
                <input type="date" id="date" name="date" required>
            </div>

            <div class="full" id="inumContainer" hidden>
                <label for="inumber">Student I#</label>
                <input type="text" id="inumber" name="inumber">
            </div>
            <div class="full" id="access" hidden>
                <label for="accode">Access Code</label>
                <input type="text" id="accode" name="accode">
            </div>

            <button class="full" type="submit">Create Ticket</button>

            <section id="message" aria-live="polite"></section>
        </form>
    </section>
</body>
</html>
